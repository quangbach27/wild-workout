name: Reusable Commit Stage

on:
  workflow_call:
    inputs:
      service:
        description: "Service name, matches internal/<service>"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-${{ inputs.service }}
  VERSION: ${{ github.sha }}

jobs:
  build:
    name: Build and Test
    if: github.event_name == 'push' || !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    services:
      postgres:
        image: postgres:17.6-alpine3.22
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: wild-workout
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d wild-workout"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      -  uses: actions/checkout@v6

      - uses: anchore/scan-action@v7
        id: scan-source
        with:
          path: internal/${{ inputs.service }}
          fail-build: false
          severity-cutoff: high

      - name: Upload Anchore source scan SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan-source.outputs.sarif }}
          category: ${{ inputs.service }}-source

      - uses: actions/setup-go@v5
        with:
          go-version-file: internal/${{ inputs.service }}/go.mod
          cache: true
          cache-dependency-path: internal/${{ inputs.service }}/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: internal/${{ inputs.service }}
          args: --timeout=5m

      - name: Test
        run: make test TAG=component,integration SERVICE=${{ inputs.service }}

      - name: Build
        working-directory: internal/${{ inputs.service }}
        run: go build -v ./...

  package:
    name: Package and Publish
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Build container image
        run: |
          docker build \
            --build-arg SERVICE=${{ inputs.service }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} \
            -f docker/app-prod/Dockerfile .

      - uses: anchore/scan-action@v7
        id: scan
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          fail-build: false
          severity-cutoff: high

      - name: Upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: ${{ inputs.service }}

      - name: Log into container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

      - name: Publish image (latest)
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
