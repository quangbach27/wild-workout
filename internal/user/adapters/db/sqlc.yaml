version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "dbmodels"
        out: "dbmodels"
        sql_package: "pgx/v5"
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

          - column: "user.users.user_uuid"
            go_type:
              import: "workout/user/app/models"
              type: UserUUID

          - column: "user.users.role"
            go_type:
              import: "workout/user/app/models"
              type: Role
