services:
  trainer:
    build:
      context: docker/app-local
    volumes:
      - ./internal/common:/app/common
      - ./internal/trainer:/app/trainer
      - ./.go/pkg:/go/pkg
      - ./.go-cache:/go-cache
    working_dir: /app
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - internal/trainer/.env
    environment:
      GOCACHE: /go-cache
      SERVICE: trainer
    networks:
      - wild-workout
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wild-workout
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - wild-workout
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wild-workout"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  wild-workout:
    driver: bridge

volumes:
  postgres-data:
